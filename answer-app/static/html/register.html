<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="static/pikme2.css" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <title>Answer</title>
</head>
<body>
  <form action="/register" method="POST" autocomplete="off">
    <h1 style="text-align:center; margin-bottom: 24px;">Register</h1>

    <label for="username">Username</label>
    <input id="username" name="username" type="text" required autocomplete="username" style="padding: 12px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: none; border-radius: 0; background: #333; color: #eee;" />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="email" style="padding: 12px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: none; border-radius: 0; background: #333; color: #eee;" />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="new-password" style="padding: 12px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: none; border-radius: 0; background: #333; color: #eee;" />

    <label for="passwordConfirm">Confirm Password</label>
    <input id="passwordConfirm" name="passwordConfirm" type="password" required autocomplete="new-password" style="padding: 12px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: none; border-radius: 0; background: #333; color: #eee;" />

    <button type="submit">Register</button>
  </form>
</body>
</html>
