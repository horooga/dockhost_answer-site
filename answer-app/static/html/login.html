<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="static/pikme2.css" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <title>Answer</title>
</head>
<body>
  <form action="/login" method="POST" autocomplete="off">
    <h1 style="text-align:center; margin-bottom: 24px;">Login</h1>

    <label for="username">Username</label>
    <input id="username" name="username" type="text" required autocomplete="username" style="padding: 12px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: none; border-radius: 0; background: #333; color: #eee;" />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password" style="padding: 12px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: none; border-radius: 0; background: #333; color: #eee;" />

    <button type="submit">Log In</button>
  </form>
</body>
</html>
